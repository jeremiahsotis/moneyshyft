map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream admin_api {
  server 127.0.0.1:3100;
  keepalive 32;
}

upstream money_api {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream connect_api {
  server 127.0.0.1:3002;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name shyftunity.com *.shyftunity.com;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name admin.shyftunity.com;

  ssl_certificate /etc/letsencrypt/live/shyftunity.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/shyftunity.com/privkey.pem;

  root /home/jeremiahotis/projects/shyftunity/apps/admin-web/dist;
  index index.html;

  location /api/ {
    proxy_pass http://admin_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

