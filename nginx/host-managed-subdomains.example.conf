# Host-managed nginx example for MoneyShyft + Admin subdomain split.
#
# Replace the example domains and certificate paths before enabling.
# - MoneyShyft web: https://moneyshyft.example.com
# - Admin web:     https://admin.example.com
# - MoneyShyft API upstream: 127.0.0.1:3000
# - Admin API upstream:      127.0.0.1:3100

upstream moneyshyft_api {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream admin_api {
  server 127.0.0.1:3100;
  keepalive 32;
}

server {
  listen 80;
  server_name moneyshyft.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 80;
  server_name admin.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name moneyshyft.example.com;

  ssl_certificate /etc/letsencrypt/live/moneyshyft.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/moneyshyft.example.com/privkey.pem;

  root /home/jeremiahotis/projects/moneyshyft/apps/moneyshyft-web/dist;
  index index.html;

  location /api/ {
    proxy_pass http://moneyshyft_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 443 ssl http2;
  server_name admin.example.com;

  ssl_certificate /etc/letsencrypt/live/admin.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.example.com/privkey.pem;

  root /home/jeremiahotis/projects/moneyshyft/apps/admin-web/dist;
  index index.html;

  location /api/ {
    proxy_pass http://admin_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
