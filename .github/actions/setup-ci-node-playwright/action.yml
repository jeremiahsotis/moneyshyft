name: setup-ci-node-playwright
description: Setup Node.js, install npm dependencies, and ensure Playwright browsers with prebuilt-image fallback.

inputs:
  node_version_file:
    description: Node version file path.
    required: false
    default: .nvmrc
  install_frontend:
    description: Install frontend dependencies via npm ci --prefix frontend.
    required: false
    default: 'false'
  install_src:
    description: Install backend dependencies via npm ci --prefix src.
    required: false
    default: 'false'
  ensure_playwright:
    description: Ensure Playwright browsers exist (prefer prebuilt image; fallback to cached/install).
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version-file: ${{ inputs.node_version_file }}
        cache: npm
        cache-dependency-path: |
          package-lock.json
          apps/routeshyft-web/package-lock.json
          apps/routeshyft-api/package-lock.json
          apps/moneyshyft-web/package-lock.json
          apps/moneyshyft-api/package-lock.json
          frontend/package-lock.json
          src/package-lock.json

    - name: Configure npm retry behavior
      shell: bash
      run: |
        npm config set fetch-retries 5
        npm config set fetch-retry-factor 2
        npm config set fetch-retry-mintimeout 10000
        npm config set fetch-retry-maxtimeout 120000

    - name: Install root dependencies
      shell: bash
      run: |
        npm ci || npm ci || npm install --no-audit --fund=false

    - name: Install frontend dependencies
      if: inputs.install_frontend == 'true'
      shell: bash
      run: |
        installed_frontend=false

        if [ -f apps/routeshyft-web/package-lock.json ]; then
          npm ci --prefix apps/routeshyft-web || npm ci --prefix apps/routeshyft-web || npm install --prefix apps/routeshyft-web --no-audit --fund=false
          installed_frontend=true
        fi

        if [ -f apps/moneyshyft-web/package-lock.json ]; then
          npm ci --prefix apps/moneyshyft-web || npm ci --prefix apps/moneyshyft-web || npm install --prefix apps/moneyshyft-web --no-audit --fund=false
          installed_frontend=true
        elif [ -f frontend/package-lock.json ]; then
          npm ci --prefix frontend || npm ci --prefix frontend || npm install --prefix frontend --no-audit --fund=false
          installed_frontend=true
        fi

        if [ "$installed_frontend" != "true" ]; then
          npm install --prefix apps/routeshyft-web --no-audit --fund=false
        fi

    - name: Install backend dependencies
      if: inputs.install_src == 'true'
      shell: bash
      run: |
        installed_backend=false

        if [ -f apps/routeshyft-api/package-lock.json ]; then
          npm ci --prefix apps/routeshyft-api --omit=dev || npm ci --prefix apps/routeshyft-api --omit=dev || npm install --prefix apps/routeshyft-api --omit=dev --no-audit --fund=false
          installed_backend=true
        fi

        if [ -f apps/moneyshyft-api/package-lock.json ]; then
          npm ci --prefix apps/moneyshyft-api --omit=dev || npm ci --prefix apps/moneyshyft-api --omit=dev || npm install --prefix apps/moneyshyft-api --omit=dev --no-audit --fund=false
          installed_backend=true
        elif [ -f src/package-lock.json ]; then
          npm ci --prefix src --omit=dev || npm ci --prefix src --omit=dev || npm install --prefix src --omit=dev --no-audit --fund=false
          installed_backend=true
        fi

        if [ "$installed_backend" != "true" ]; then
          npm install --prefix apps/routeshyft-api --omit=dev --no-audit --fund=false
        fi

        if [ ! -e apps/connectshyft-api/node_modules ] && [ -d apps/moneyshyft-api/node_modules ]; then
          ln -s ../moneyshyft-api/node_modules apps/connectshyft-api/node_modules
        fi

    - name: Cache Playwright browsers (fallback)
      if: inputs.ensure_playwright == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

    - name: Ensure Playwright browsers
      if: inputs.ensure_playwright == 'true'
      shell: bash
      run: |
        if [ -d /ms-playwright ] && [ "$(find /ms-playwright -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')" -gt 0 ]; then
          echo "Using prebuilt Playwright browsers from container image."
        else
          echo "Prebuilt Playwright browsers unavailable; using cached/install fallback."
          npx playwright install chromium
        fi
