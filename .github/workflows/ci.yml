name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install
        run: npm ci || npm install --no-audit --fund=false

      - name: Policy gate
        run: npm run policy:check

      - name: Workspace boundaries (optional)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['boundary:check'] ? 0 : 1)"; then
            npm run boundary:check
          else
            echo "boundary:check script not defined in this branch; skipping standalone boundary step."
          fi
