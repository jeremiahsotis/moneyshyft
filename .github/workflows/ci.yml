name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install
        run: npm ci || npm install --no-audit --fund=false

      - name: Nx affected - build
        run: |
          BASE_REF="origin/main"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          elif git show-ref --verify --quiet refs/remotes/origin/codex/dev; then
            BASE_REF="origin/codex/dev"
          fi
          npx nx affected -t build --base="$BASE_REF" --head=HEAD

      - name: Nx affected - test
        run: |
          BASE_REF="origin/main"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          elif git show-ref --verify --quiet refs/remotes/origin/codex/dev; then
            BASE_REF="origin/codex/dev"
          fi
          npx nx affected -t test --base="$BASE_REF" --head=HEAD
