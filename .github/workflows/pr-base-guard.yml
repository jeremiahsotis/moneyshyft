name: PR Base Guard

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

jobs:
  enforce-base:
    name: enforce-story-pr-base
    runs-on: ubuntu-latest
    steps:
      - name: Validate codex PR base branch
        run: |
          if [[ "${{ github.head_ref }}" == codex/* ]]; then
            if [[ "${{ github.base_ref }}" != "codex/dev" ]]; then
              echo "❌ codex/* branches must target codex/dev"
              exit 1
            fi
          fi
