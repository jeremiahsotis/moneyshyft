name: PR Base Guard

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

jobs:
  enforce-base:
    name: enforce-story-pr-base
    runs-on: ubuntu-latest
    steps:
      - name: Validate story PR base branch
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$HEAD_REF" =~ ^codex/story- ]] && [[ "$BASE_REF" != "codex/dev" ]]; then
            echo "Story branches must target codex/dev."
            echo "Head: $HEAD_REF"
            echo "Base: $BASE_REF"
            exit 1
          fi

          echo "PR base guard passed."
