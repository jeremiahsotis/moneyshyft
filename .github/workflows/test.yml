name: ConnectShyft CI

on:
  pull_request:
    branches: [production, codex/dev]
  push:
    branches: [production, codex/dev]
  merge_group:
  workflow_dispatch:
    inputs:
      run_backend_contracts:
        description: 'Run backend-connected contract tests'
        required: false
        default: 'false'
        type: boolean
      run_epic0_quality:
        description: 'Run Epic 0 quality gate checks'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      run_heavy_ci: ${{ steps.decide.outputs.run_heavy_ci }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            heavy:
              - 'apps/**'
              - 'tests/**'
              - 'scripts/**'
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'package.json'
              - 'package-lock.json'
              - 'apps/moneyshyft-api/package-lock.json'
              - 'apps/connectshyft-web/package-lock.json'
      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_heavy_ci=true" >> "$GITHUB_OUTPUT"
            echo "reason=Non-pull_request event requires full CI matrix." >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.heavy }}" = "true" ]; then
            echo "run_heavy_ci=true" >> "$GITHUB_OUTPUT"
            echo "reason=PR includes runtime-affecting changes." >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy_ci=false" >> "$GITHUB_OUTPUT"
            echo "reason=PR is docs/story-artifact-only; skipping shard matrix." >> "$GITHUB_OUTPUT"
          fi

  policy:
    name: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-ci-node-playwright
        with:
          install_src: 'true'
          install_frontend: 'false'
          ensure_playwright: 'false'
      - name: Policy gate
        run: npm run policy:check

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: policy
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-node-playwright
        with:
          install_src: 'true'
          install_frontend: 'false'
          ensure_playwright: 'false'
      - name: Lint or discovery fallback
        run: bash scripts/lint-or-discovery.sh

  test:
    name: test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.run_heavy_ci == 'true'
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moneyshyft_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d moneyshyft_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/moneyshyft_ci
      TEST_ENV: local
      ENABLE_TEST_AUTH_HARNESS: 'true'
      TEST_EMAIL: test@example.com
      TEST_PASSWORD: test1234
      BASE_URL: http://localhost:5174
      API_URL: http://localhost:3000
      API_BASE_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:5174
      VITE_API_PROXY_TARGET: http://localhost:3000
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-node-playwright
        with:
          install_src: 'true'
          install_frontend: 'true'
          ensure_playwright: 'true'
      - name: Run Playwright shard
        run: bash scripts/ci-run-playwright-stack.sh npx playwright test --shard=${{ matrix.shard }}/4
      - name: Save shard gate snapshot
        if: always()
        run: |
          mkdir -p tests/artifacts/gates
          if [ -f tests/artifacts/test-results/results.json ]; then
            cp tests/artifacts/test-results/results.json tests/artifacts/gates/results-shard-${{ matrix.shard }}.json
          else
            cat > tests/artifacts/gates/results-shard-${{ matrix.shard }}.json <<'JSON'
          {"ok":false,"error":"results.json missing for shard artifact"}
          JSON
          fi
      - name: Upload shard gate snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-snapshot-shard-${{ matrix.shard }}
          path: tests/artifacts/gates/results-shard-${{ matrix.shard }}.json
          retention-days: 30
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-failure-shard-${{ matrix.shard }}
          path: |
            tests/artifacts/test-results/
            tests/artifacts/playwright-report/
            tests/artifacts/junit/
            tests/artifacts/gates/
            tests/artifacts/runtime/
          retention-days: 30

  burn-in:
    name: burn-in
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.run_heavy_ci == 'true' && needs.test.result == 'success'
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moneyshyft_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d moneyshyft_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/moneyshyft_ci
      TEST_ENV: local
      ENABLE_TEST_AUTH_HARNESS: 'true'
      TEST_EMAIL: test@example.com
      TEST_PASSWORD: test1234
      BASE_URL: http://localhost:5174
      API_URL: http://localhost:3000
      API_BASE_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:5174
      VITE_API_PROXY_TARGET: http://localhost:3000
      BURN_IN_REQUIRE_TESTS: 'true'
      BURN_IN_FALLBACK_SPECS: >-
        tests/api/platform/2-1-commitment-domain-model-and-transition-rules.atdd.api.spec.ts
        tests/e2e/platform/2-1-commitment-domain-model-and-transition-rules.atdd.spec.ts
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-node-playwright
        with:
          install_src: 'true'
          install_frontend: 'true'
          ensure_playwright: 'true'
      - name: Run burn-in loop (10 iterations)
        run: |
          BASE_REF="origin/production"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          fi
          bash scripts/ci-run-playwright-stack.sh bash scripts/burn-in.sh 10 "$BASE_REF"
      - name: Upload burn-in artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-artifacts
          path: |
            tests/artifacts/test-results/
            tests/artifacts/playwright-report/
            tests/artifacts/junit/
            tests/artifacts/runtime/
          retention-days: 30

  quality-gates:
    name: quality-gates
    runs-on: ubuntu-latest
    needs: [burn-in, test, changes]
    if: |
      always() && (
        (needs.test.result == 'success' && needs['burn-in'].result == 'success') ||
        (
          needs.test.result == 'skipped' &&
          needs['burn-in'].result == 'skipped' &&
          needs.changes.outputs.run_heavy_ci != 'true'
        )
      )
    steps:
      - name: Skip quality gates for docs/story-artifact-only PRs
        if: needs.test.result == 'skipped' && needs['burn-in'].result == 'skipped'
        run: |
          {
            echo "## Quality Gates"
            echo ""
            echo "- status: skipped"
            echo "- reason: ${{ needs.changes.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/checkout@v4
        if: needs.test.result == 'success'
      - uses: ./.github/actions/setup-ci-node-playwright
        if: needs.test.result == 'success'
        with:
          install_src: 'true'
          install_frontend: 'false'
          ensure_playwright: 'false'
      - name: Download shard artifacts
        if: needs.test.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: gate-snapshot-shard-*
          merge-multiple: true
          path: tests/artifacts/gates/
      - name: Run quality gates
        if: needs.test.result == 'success'
        run: bash scripts/quality-gates.sh
      - name: Upload quality gate artifacts
        if: needs.test.result == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: quality-gates
          path: tests/artifacts/
          retention-days: 30

  epic-0-quality:
    name: epic-0-quality
    runs-on: ubuntu-latest
    needs: quality-gates
    if: |
      always() &&
      needs['quality-gates'].result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_epic0_quality == 'true') ||
        startsWith(github.ref, 'refs/heads/codex/epic-0-ops') ||
        (github.event_name == 'pull_request' && startsWith(github.head_ref, 'codex/epic-0-ops'))
      )
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-node-playwright
        with:
          install_src: 'true'
          install_frontend: 'false'
          ensure_playwright: 'false'
      - name: Run Epic 0 quality gates
        run: bash scripts/quality-gates-epic0.sh
      - name: Upload Epic 0 gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-0-quality-gates
          path: tests/artifacts/gates/epic-0-quality.json
          retention-days: 30

  backend-contracts:
    name: backend-contracts
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_backend_contracts == 'true'
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy
    env:
      API_URL: ${{ vars.API_URL }}
      RS_CONTRACT_PICKUP_PATH: ${{ vars.RS_CONTRACT_PICKUP_PATH }}
      RS_CONTRACT_PUBLISH_PATH: ${{ vars.RS_CONTRACT_PUBLISH_PATH }}
      RS_CONTRACT_COMPLETE_PATH: ${{ vars.RS_CONTRACT_COMPLETE_PATH }}
      WP_TEST_NONCE: ${{ secrets.WP_TEST_NONCE }}
      WP_TEST_AUTHORIZATION: ${{ secrets.WP_TEST_AUTHORIZATION }}
      WP_TEST_CAPABILITY: ${{ vars.WP_TEST_CAPABILITY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-node-playwright
        with:
          install_src: 'true'
          install_frontend: 'false'
          ensure_playwright: 'true'
      - name: Run backend-connected contracts
        run: npm run test:contracts:backend

  report:
    name: report
    runs-on: ubuntu-latest
    needs: [changes, policy, lint, test, burn-in, quality-gates, epic-0-quality, backend-contracts]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Compute release-readiness status
        id: release_readiness
        run: |
          blocked_jobs=()

          if [ "${{ needs.policy.result }}" != "success" ]; then
            blocked_jobs+=("policy")
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            blocked_jobs+=("lint")
          fi
          if [ "${{ needs.changes.outputs.run_heavy_ci }}" = "true" ] && [ "${{ needs.test.result }}" != "success" ]; then
            blocked_jobs+=("test")
          fi
          if [ "${{ needs.changes.outputs.run_heavy_ci }}" = "true" ] && [ "${{ needs['burn-in'].result }}" != "success" ]; then
            blocked_jobs+=("burn-in")
          fi
          if [ "${{ needs.changes.outputs.run_heavy_ci }}" = "true" ] && [ "${{ needs['quality-gates'].result }}" != "success" ]; then
            blocked_jobs+=("quality-gates")
          fi

          if [ "${#blocked_jobs[@]}" -eq 0 ]; then
            echo "status=ready" >> "$GITHUB_OUTPUT"
            echo "blocked_jobs=none" >> "$GITHUB_OUTPUT"
          else
            blocked_csv="$(IFS=,; echo "${blocked_jobs[*]}")"
            echo "status=blocked" >> "$GITHUB_OUTPUT"
            echo "blocked_jobs=$blocked_csv" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish summary
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- release-readiness: ${{ steps.release_readiness.outputs.status }}"
            echo "- release-blockers: ${{ steps.release_readiness.outputs.blocked_jobs }}"
            echo "- policy: ${{ needs.policy.result }}"
            echo "- lint: ${{ needs.lint.result }}"
            echo "- changes: ${{ needs.changes.outputs.reason }}"
            echo "- test: ${{ needs.test.result }}"
            echo "- burn-in: ${{ needs['burn-in'].result }}"
            echo "- quality-gates: ${{ needs['quality-gates'].result }}"
            echo "- epic-0-quality: ${{ needs['epic-0-quality'].result }}"
            echo "- backend-contracts: ${{ needs['backend-contracts'].result }}"
            echo "- run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- artifacts: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Slack failure notification
        if: steps.release_readiness.outputs.status == 'blocked' && env.SLACK_WEBHOOK_URL != ''
        run: |
          payload=$(cat <<JSON
          {
            "text": "MoneyShyft CI release-readiness blocked (${{ steps.release_readiness.outputs.blocked_jobs }}): ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          )
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
