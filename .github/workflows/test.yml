name: RouteShyft CI

on:
  pull_request:
    branches: [production, codex/dev]
  push:
    branches: [production]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      run_backend_contracts:
        description: 'Run backend-connected contract tests'
        required: false
        default: false
        type: boolean
      run_epic0_quality:
        description: 'Run Epic 0 quality gate checks'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  policy:
    name: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Policy gate
        run: npm run policy:check

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: policy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Lint or discovery fallback
        run: bash scripts/lint-or-discovery.sh

  test:
    name: test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright shard
        run: npm run test:e2e -- --shard=${{ matrix.shard }}/4
      - name: Save shard gate snapshot
        if: always()
        run: |
          mkdir -p tests/artifacts/gates
          if [ -f tests/artifacts/test-results/results.json ]; then
            cp tests/artifacts/test-results/results.json tests/artifacts/gates/results-shard-${{ matrix.shard }}.json
          fi
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-shard-${{ matrix.shard }}
          path: |
            tests/artifacts/test-results/
            tests/artifacts/playwright-report/
            tests/artifacts/junit/
            tests/artifacts/gates/
          retention-days: 30

  burn-in:
    name: burn-in
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run burn-in loop
        run: bash scripts/burn-in.sh 10 origin/production
      - name: Upload burn-in artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-artifacts
          path: |
            tests/artifacts/test-results/
            tests/artifacts/playwright-report/
            tests/artifacts/junit/
          retention-days: 30

  quality-gates:
    name: quality-gates
    runs-on: ubuntu-latest
    needs: [test, burn-in]
    if: always() && needs.test.result == 'success' && (needs['burn-in'].result == 'success' || needs['burn-in'].result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-artifacts-shard-*
          merge-multiple: true
          path: tests/artifacts/
      - name: Run quality gates
        run: bash scripts/quality-gates.sh
      - name: Upload quality gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gates
          path: tests/artifacts/
          retention-days: 30

  epic-0-quality:
    name: epic-0-quality
    runs-on: ubuntu-latest
    needs: quality-gates
    if: |
      always() &&
      needs['quality-gates'].result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.run_epic0_quality == true) ||
        startsWith(github.ref, 'refs/heads/codex/epic-0-ops') ||
        (github.event_name == 'pull_request' && startsWith(github.head_ref, 'codex/epic-0-ops'))
      )
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Run Epic 0 quality gates
        run: bash scripts/quality-gates-epic0.sh
      - name: Upload Epic 0 gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-0-quality-gates
          path: tests/artifacts/gates/epic-0-quality.json
          retention-days: 30

  backend-contracts:
    name: backend-contracts
    runs-on: ubuntu-latest
    needs: policy
    if: github.event_name == 'workflow_dispatch' && inputs.run_backend_contracts == true
    env:
      API_URL: ${{ vars.API_URL }}
      RS_CONTRACT_PICKUP_PATH: ${{ vars.RS_CONTRACT_PICKUP_PATH }}
      RS_CONTRACT_PUBLISH_PATH: ${{ vars.RS_CONTRACT_PUBLISH_PATH }}
      RS_CONTRACT_COMPLETE_PATH: ${{ vars.RS_CONTRACT_COMPLETE_PATH }}
      WP_TEST_NONCE: ${{ secrets.WP_TEST_NONCE }}
      WP_TEST_AUTHORIZATION: ${{ secrets.WP_TEST_AUTHORIZATION }}
      WP_TEST_CAPABILITY: ${{ vars.WP_TEST_CAPABILITY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run backend-connected contracts
        run: npm run test:contracts:backend

  report:
    name: report
    runs-on: ubuntu-latest
    needs: [policy, lint, test, burn-in, quality-gates, epic-0-quality, backend-contracts]
    if: always()
    steps:
      - name: Publish summary
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- policy: ${{ needs.policy.result }}"
            echo "- lint: ${{ needs.lint.result }}"
            echo "- test: ${{ needs.test.result }}"
            echo "- burn-in: ${{ needs['burn-in'].result }}"
            echo "- quality-gates: ${{ needs['quality-gates'].result }}"
            echo "- epic-0-quality: ${{ needs['epic-0-quality'].result }}"
            echo "- backend-contracts: ${{ needs['backend-contracts'].result }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Slack failure notification
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          payload=$(cat <<JSON
          {
            "text": "RouteShyft CI failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          )
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
